<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-labelledby="title desc">
  <title id="title">Neutral pelvis and anterior pelvic tilt comparison</title>
  <desc id="desc">Side-view educational diagram comparing a neutral pelvis position with an anterior pelvic tilt pattern and a larger low-back curve.</desc>
  <rect width="900" height="420" fill="#ffffff"/>
  <style>
    .label { font: 700 22px Arial, sans-serif; fill: #1f2937; }
    .small { font: 16px Arial, sans-serif; fill: #374151; }
    .body { fill: none; stroke: #334155; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
    .guide { fill: none; stroke: #94a3b8; stroke-width: 3; stroke-dasharray: 9 8; }
    .pelvis { fill: none; stroke: #2563eb; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
    .accent { fill: none; stroke: #dc2626; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    .dot { fill: #2563eb; }
  </style>

  <text x="120" y="48" class="label">Neutral reference</text>
  <text x="548" y="48" class="label">Anterior pelvic tilt</text>

  <g transform="translate(105 78)">
    <path class="guide" d="M138 36 L138 292"/>
    <path class="body" d="M150 42 C126 86 128 130 143 174 C153 202 155 228 146 260"/>
    <path class="body" d="M146 260 L121 325"/>
    <path class="body" d="M146 260 L177 325"/>
    <path class="body" d="M145 84 L104 132"/>
    <path class="body" d="M145 84 L188 132"/>
    <ellipse class="pelvis" cx="145" cy="205" rx="54" ry="35" transform="rotate(0 145 205)"/>
    <circle class="dot" cx="105" cy="204" r="6"/>
    <circle class="dot" cx="185" cy="204" r="6"/>
    <path class="accent" d="M104 204 L186 204"/>
    <text x="58" y="372" class="small">Front and back pelvic landmarks are roughly level.</text>
  </g>

  <g transform="translate(525 78)">
    <path class="guide" d="M138 36 L138 292"/>
    <path class="body" d="M150 42 C128 82 130 124 150 166 C171 211 170 238 146 260"/>
    <path class="body" d="M146 260 L121 325"/>
    <path class="body" d="M146 260 L177 325"/>
    <path class="body" d="M145 84 L104 132"/>
    <path class="body" d="M145 84 L188 132"/>
    <ellipse class="pelvis" cx="145" cy="205" rx="54" ry="35" transform="rotate(16 145 205)"/>
    <circle class="dot" cx="102" cy="219" r="6"/>
    <circle class="dot" cx="188" cy="191" r="6"/>
    <path class="accent" d="M102 219 L188 191"/>
    <path class="accent" d="M225 194 C244 205 250 229 241 251"/>
    <path class="accent" d="M241 251 L252 238"/>
    <path class="accent" d="M241 251 L226 247"/>
    <text x="18" y="372" class="small">Front landmark sits lower; low-back curve often looks larger.</text>
  </g>
</svg>
