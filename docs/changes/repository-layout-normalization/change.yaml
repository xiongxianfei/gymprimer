notes:
  - Created after the architecture target shape identified five logical blocks and a future physical migration requirement.
  - M3 has moved canonical Markdown content paths and removed the old content/red-flags directories directly.
  - Media co-location and historical structured-platform cleanup remain for M4.
  - Spec-review R1 requested changes for old-path compatibility, red-flags/orientation path policy, and media migration determinism.
  - Spec revision resolved R1 findings by choosing direct old-path removal, root RED-FLAGS.md, direct media co-location, and direct historical-artifact removal when no active dependency remains.
  - Spec revision added dependency-first migration requirements: inventory active dependencies, update or remove references first, then move or remove files.
  - Spec-review R2 approved the revised migration spec and routed the change to architecture or ADR review.
  - Architecture update drafted canonical architecture changes and proposed ADR 2026-06-29-direct-repository-layout-normalization.
  - Architecture-review R1 approved the architecture update and ADR with no material findings; architecture status and ADR status must be normalized before planning relies on them.
  - Architecture status normalized to approved and ADR 2026-06-29-direct-repository-layout-normalization normalized to accepted.
  - Plan created at docs/plans/2026-06-29-repository-layout-normalization.md and indexed in docs/plan.md.
  - Plan-review R1 requested revision for PR-RLN-1: remove test-spec authoring ownership from implementation milestones.
  - Plan revision resolved PR-RLN-1 by moving AC3/test-spec ownership to the downstream test-spec stage and adding the R1-R25/EC1-EC9 pre-implementation dependency.
  - Plan-review R2 approved the revised plan and routed the change to test-spec.
  - Test spec created at specs/repository-layout-normalization.test.md and maps R1-R25 plus EC1-EC9 before M1 starts.
  - Test-spec-review R1 requested revisions for TSR-RLN-1 and TSR-RLN-2: add proof/command milestone ownership and bounded manual-proof ownership.
  - TSR-RLN-1 resolved by adding test ownership and planned validation command ownership maps to specs/repository-layout-normalization.test.md.
  - TSR-RLN-2 resolved by removing manual-proof requirements and replacing them with deterministic evidence records.
  - Test-spec-review R2 approved the revised proof map and allowed implementation handoff to M1.
  - M1 implemented dependency inventory evidence at docs/changes/repository-layout-normalization/evidence/dependency-inventory.md without moving or removing files.
  - Code-review M1 R1 closed M1 with no material findings and routed the change to M2 implementation.
  - M2 implemented checker enforcement and regression tests for normalized layout paths without moving real content or media files.
  - Code-review M2 R1 closed M2 with no material findings and routed the change to M3 implementation.
  - M3 moved canonical Markdown content paths and root red flags, updated active references, and left media bucket cleanup to M4.
  - Code-review M3 R1 requested resolution for CR-RLN-M3-1 because M3 rewrote exact dependency inventory and validation metadata into placeholders while cleaning stale path strings.
  - Review-resolution for CR-RLN-M3-1 restored exact M1 inventory evidence and narrowed the M3 stale-path scan to active content, tests, and tools.
  - Code-review M3 R2 closed M3 with no material findings and routed the change to M4 implementation.
