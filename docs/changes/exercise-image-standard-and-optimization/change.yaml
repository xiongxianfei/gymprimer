notes:
  - Proposal-review R1 approved the exercise-image standard direction.
  - Spec-review R2 approved the spec after SR-EIS-1 resolution.
  - Architecture-review R1 approved the canonical architecture amendment and ADR.
  - Plan-review R1 approved the execution plan.
  - Test-spec-review R2 approved implementation handoff after TSR-EIS-1 resolution made template-aware checker support an explicit M1/M2 obligation.
  - M1 implemented the checker and focused tests for exercise-image purposes, generated-raster provenance, image-count limits, alt text, legacy compatibility, and template-aware validation; code-review is next.
  - Code-review M1 R1 requested changes because required EIS-CMD4 privacy validation failed on pre-existing superseded-plan examples.
  - Owner directed broad privacy validation to move to verify before PR. The test spec and plan now defer EIS-CMD4 to lifecycle closeout / verify, pending test-spec-review before M1 code-review re-review.
  - Test-spec-review R3 requested changes because the plan still listed broad EIS-CMD4 as an implementation-start command.
  - Test-spec revision aligned the plan's general validation section and the test spec's stale next-artifact/readiness wording with EIS-CMD4 lifecycle closeout / verify ownership; test-spec-review is next.
  - Test-spec-review R4 approved the TSR-EIS-2 revision; M1 code-review re-review is next.
  - Code-review M1 R2 resolved CR-EIS-M1-1 and closed M1; M2 implementation is next.
  - M2 added optional exercise-image template guidance plus visual-safety and beginner-comprehension evidence templates; code-review M2 is next.
  - Code-review M2 R1 closed M2 with no material findings; M3 implementation is next.
  - M3 added one movement image for each forward-head support exercise, exact provenance rows, visual-safety evidence, and beginner-comprehension evidence; code-review M3 is next.
  - Code-review M3 R1 requested changes for CR-EIS-M3-1 and CR-EIS-M3-2; review-resolution is next.
  - M3 review-resolution addressed CR-EIS-M3-1 locally by replacing the wall-slide movement image, replacing the other movement images for clarity, adding one muscle-attention image per target page, updating provenance rows, and refreshing visual-safety evidence.
  - CR-EIS-M3-2 remains open because the revised material image batch still needs non-identifying reader-prompt beginner-comprehension evidence before M3 can return to code-review.
  - Prompt-preservation spec amendment set the exercise-image spec back to draft and added exact full prompt-record requirements; spec-review is next before architecture, test-spec, plan, or implementation updates.
  - Spec-review R3 requested changes because the prompt-record amendment requires a provenance-to-prompt-record link but leaves the link field name or deterministic mapping undefined.
  - SR-EIS-2 was addressed by defining `prompt_record` as the required provenance field for generated raster exercise image prompt-record links; spec-review re-review is next.
  - Spec-review R4 approved the prompt-record amendment after SR-EIS-2 resolution; architecture or ADR assessment is next.
  - Architecture amendment added prompt-record validation flow, `prompt_record` provenance linking, prompt-record packaging, and ADR 2026-07-03 generated raster prompt records; architecture-review R2 followed.
  - Architecture-review R2 approved the prompt-record canonical architecture amendment and ADR; architecture status normalization is next before plan or test-spec amendments rely on it.
  - Architecture status was normalized to approved. The plan now adds M3A for prompt-record checker support, test coverage, and M3 prompt-record backfill or replacement decisions; plan-review is next before test-spec amendment.
  - Plan-review R2 approved the M3A prompt-record validation and M3 backfill plan amendment; test-spec amendment is next.
  - Test spec was amended with M3A prompt-record requirement, example, edge-case, command, fixture, migration, observability, and readiness coverage; test-spec-review R5 followed.
  - Test-spec-review R5 approved the M3A prompt-record proof map; implementation handoff is allowed for M3A.
  - M3A implemented prompt-record checker support, focused tests, the `prompt_record` provenance column, and explicit compatibility-limitation evidence for in-flight M3 images whose exact prompts were not recoverable from durable repository evidence; code-review is next.
  - Code-review M3A R1 requested changes for CR-EIS-M3A-1 because the compatibility limitation bypass is not scoped to the recorded pre-amendment M3 assets; review-resolution is next.
  - Review-resolution addressed CR-EIS-M3A-1 by constraining the compatibility limitation to the recorded M3 assets and adding regression coverage; after CR-EIS-M3-2 replacements, that compatibility path now applies only to the five unreplaced assets.
  - Code-review M3A R2 resolved CR-EIS-M3A-1 but requested changes for CR-EIS-M3A-2 because plan milestone states drifted for M3 and M3A; review-resolution is next.
  - Review-resolution addressed CR-EIS-M3A-2 by restoring M3 to resolution-needed while CR-EIS-M3-2 remains open and returning M3A to review-requested for code-review re-review.
  - Owner reader-prompt evidence and post-replacement clarity confirmation for CR-EIS-M3-2 are recorded. The unclear or inconsistent affected images were replaced with prompt-record-backed assets, and CR-EIS-M3-2 is addressed pending code-review re-review.

